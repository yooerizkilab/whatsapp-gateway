version: '3.8'

services:
  # Database
  db:
    image: mysql:8.0
    container_name: whatsappin-db
    restart: always
    environment:
      MYSQL_DATABASE: whatsapp_gateway
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis (for Queue)
  redis:
    image: redis:alpine
    container_name: whatsappin-redis
    restart: always
    ports:
      - "6379:6379"

  # Backend API
  backend:
    build: ./backend
    container_name: whatsappin-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: mysql://root:password@db:3306/whatsapp_gateway
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      # Add other envs here
    ports:
      - "3001:3001"
    volumes:
      - ./backend/sessions:/app/sessions

  # Frontend SaaS
  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:3001
    container_name: whatsappin-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data:
